<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Liên kết cộng đồng Yến Vân Guide — TikTok, Discord, Facebook, YouTube">
<title>Liên Kết — Yến Vân Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="nav-root"></div>

<div class="page-wrap">
  <div class="links-page">

    <!-- PROFILE -->
    <div class="links-profile">
      <div class="links-avatar">⚔</div>
      <div class="links-name">Yến Vân Guide</div>
      <div class="links-bio">
        Kênh hướng dẫn Where Winds Meet tiếng Việt<br>
        Gameplay · Phân tích nhân vật · Tin tức game
      </div>
    </div>

    <!-- LINKS LIST -->
    <div id="links-list">
      <!-- Filled by JS -->
    </div>

  </div>
</div>

<div id="footer-root"></div>

<script src="assets/main.js"></script>
<script>
(async function() {
  document.getElementById('nav-root').innerHTML = buildNav('links');
  document.getElementById('footer-root').innerHTML = buildFooter();

  // Fetch links
  const links = await fetch('data/links.json').then(r => r.json());

  // Sort by order
  const sorted = [...links].sort((a, b) => (a.order || 0) - (b.order || 0));

  document.getElementById('links-list').innerHTML = sorted.map(l => renderLinkCard(l)).join('');

})().catch(console.error);
</script>
</body>
</html>
