<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Embed</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    /* match --bg3 từ style.css (nền modal nội dung) */
    background: #181c24; 
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .tiktok-embed {
    margin: 0 !important;
    border: none !important;
    width: 100% !important;
  }
</style>
</head>
<body>
<div id="embed-container" style="width: 100%; height: 100%; max-height: 100vh;"></div>
<script>
  // Lấy video ID từ tham số URL (?id=...)
  const params = new URLSearchParams(window.location.search);
  const videoId = params.get('id');

  if (videoId) {
    const container = document.getElementById('embed-container');
    // Inject HTML blockquote chuẩn xác theo format của TikTok
    container.innerHTML = `
      <blockquote class="tiktok-embed" 
                  cite="https://www.tiktok.com/@tiu.hng.tuyn/video/${videoId}" 
                  data-video-id="${videoId}" 
                  data-theme="dark"
                  style="max-width: 100%; min-width: 0px;" >
        <section></section>
      </blockquote>
    `;
    
    // Tạo thẻ script động để tải js của TikTok
    // Cách này đảm bảo embed.js sẽ quét DOM hiện tại thay vì bị cache do SPA
    const script = document.createElement('script');
    script.src = 'https://www.tiktok.com/embed.js';
    script.async = true;
    document.body.appendChild(script);
  }
</script>
</body>
</html>
