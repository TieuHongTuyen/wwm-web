    <!-- ERROR STATE -->

      <div id="art-error-msg">KhÃ´ng tÃ¬m tháº¥y bÃ i viáº¿t.</div>
      <a href="articles.html" class="btn-ghost" style="margin-top:1.5rem;display:inline-block;font-size:0.75rem">â† Quay láº¡i bÃ i viáº¿t</a>
    </div>

      <!-- Video embed block (náº¿u cÃ³ related_video_id) -->
      <div id="art-video-block" style="display:none">
        <div class="video-embed-block">
          <div class="video-embed-preview">â–¶</div>
          <div class="video-embed-info">
            <h4 id="art-video-title">Video liÃªn quan</h4>
            <p>Xem video phÃ¢n tÃ­ch Ä‘áº§y Ä‘á»§ trÃªn TikTok vá»›i cÃ¡c vÃ­ dá»¥ thá»±c chiáº¿n</p>
            <button class="video-embed-btn" id="art-video-btn">â–¶ Xem video</button>
          </div>
        </div>
      </div>

      <!-- Back button -->
      <div style="margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border2)">
        <a href="articles.html" class="btn-ghost" style="font-size:0.75rem">â† Quay láº¡i bÃ i viáº¿t</a>

<div id="modal-root"></div>
<div id="footer-root"></div>

<script src="assets/main.js"></script>
<script>
(async function() {
  document.getElementById('nav-root').innerHTML = buildNav('articles');
  document.getElementById('modal-root').innerHTML = buildModal();
  document.getElementById('footer-root').innerHTML = buildFooter();

  // Cáº¥u hÃ¬nh marked.js: renderer custom cho h2
  const renderer = new marked.Renderer();
  renderer.heading = function(text, level) {
    // text cÃ³ thá»ƒ lÃ  object (marked v9) hoáº·c string
    const txt = (typeof text === 'object' && text.text) ? text.text : String(text);
    const lv  = (typeof text === 'object' && text.depth) ? text.depth : Number(level);
    if (lv === 2) {
      return `<h2>${txt}</h2>`;
    }
    return `<h${lv}>${txt}</h${lv}>`;
  };
  marked.use({ renderer });

  // Láº¥y id tá»« URL
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { showError('Thiáº¿u tham sá»‘ ?id='); return; }

  // Fetch articles.json
  let articles;
  try {
    articles = await fetch('data/articles.json').then(r => r.json());
  } catch(e) { showError('KhÃ´ng táº£i Ä‘Æ°á»£c danh sÃ¡ch bÃ i viáº¿t.'); return; }

  const article = articles.find(a => a.id === id);
  if (!article) { showError(`KhÃ´ng tÃ¬m tháº¥y bÃ i viáº¿t vá»›i id="${id}"`); return; }

  // Cáº­p nháº­t title trang
  document.title = article.title + ' â€” Yáº¿n VÃ¢n Guide';
  document.querySelector('meta[name="description"]').content = article.description;

  // Fetch Markdown
  let markdown;
  try {
    const mdRes = await fetch(article.file);
    if (!mdRes.ok) throw new Error('404');
    markdown = await mdRes.text();
  } catch(e) { showError('KhÃ´ng táº£i Ä‘Æ°á»£c ná»™i dung bÃ i viáº¿t.'); return; }

  // XÃ³a dÃ²ng `# TiÃªu Ä‘á»` Ä‘áº§u tiÃªn (Ä‘Ã£ render báº±ng article-detail-title)
  const mdLines = markdown.split('\n');
  const bodyLines = mdLines[0].startsWith('# ')
    ? mdLines.slice(1).join('\n').trimStart()
    : markdown;

  // TÃ¡ch lead paragraph (Ä‘oáº¡n Ä‘áº§u trÆ°á»›c ## Ä‘áº§u tiÃªn)
  const firstSection = bodyLines.split(/^##\s/m);
  let leadText = '';
  let bodyText = bodyLines;
  if (firstSection.length > 1) {
    const leadBlock = firstSection[0].trim();
    leadText = leadBlock;
    bodyText = bodyLines.slice(bodyLines.indexOf('##'));
  }

  // Render header
  const badge = getCategoryBadge(article.category);
  document.getElementById('art-badge').className = `art-cat-badge ${badge.cls}`;
  document.getElementById('art-badge').textContent = `${badge.icon} ${article.category}`;
  document.getElementById('art-title').textContent = article.title;
  document.getElementById('art-lead').textContent = article.description;
  document.getElementById('art-meta').innerHTML = `
    <span>${formatDate(article.date)}</span>
    <span>Â·</span>
    <span>${escHtml(article.readtime)} Ä‘á»c</span>
    <span>Â·</span>
    <span>${formatViews(article.views)} lÆ°á»£t xem</span>`;

  // Render body
  document.getElementById('art-body').innerHTML = marked.parse(bodyText);

  // Video embed block
  if (article.related_video_id) {
    const videoBlock = document.getElementById('art-video-block');
    videoBlock.style.display = 'block';
    document.getElementById('art-video-title').textContent = article.title + ' â€” Video chi tiáº¿t';
    document.getElementById('art-video-btn').onclick = function() {
      openModal(article.related_video_id, article.title, article.category);
    };
  }

  // Hiá»ƒn thá»‹ content
  document.getElementById('art-loading').style.display = 'none';
  document.getElementById('art-content').style.display  = 'block';

  function showError(msg) {
    document.getElementById('art-loading').style.display = 'none';
    document.getElementById('art-error').style.display   = 'block';
    document.getElementById('art-error-msg').textContent = msg;
  }

})().catch(err => {
  console.error(err);
  document.getElementById('art-loading').style.display = 'none';
  document.getElementById('art-error').style.display   = 'block';
});

function showError(msg) {
  document.getElementById('art-loading').style.display = 'none';
  document.getElementById('art-error').style.display   = 'block';
  document.getElementById('art-error-msg').textContent = msg;
}
</script>
</body>
</html>
